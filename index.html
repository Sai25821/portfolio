*{margin:0;padding:0;box-sizing:border-box;}
:root{
--bg:#0d1117;--surface:#161b22;--border:#30363d;
--text:#e6edf3;--text-muted:#8b949e;--accent:#58a6ff;
--tag-bg:rgba(88,166,255,0.1);--tag-color:#58a6ff;--tag-border:rgba(88,166,255,0.3);
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;}
a{color:var(--accent);text-decoration:none;}
nav{position:fixed;top:0;width:100%;background:rgba(13,17,23,0.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:16px 40px;display:flex;justify-content:space-between;align-items:center;z-index:100;}
.logo{font-weight:700;font-size:1.2rem;color:var(--accent);}
nav ul{list-style:none;display:flex;gap:24px;}
nav ul a{color:var(--text-muted);font-size:0.9rem;transition:color 0.2s;}
nav ul a:hover{color:var(--accent);}
.hero{padding:120px 40px 80px;max-width:900px;margin:0 auto;}
.badge{display:inline-block;border:1px solid var(--border);border-radius:20px;padding:6px 16px;font-size:0.82rem;color:var(--text-muted);margin-bottom:20px;}
.hero h1{font-size:3rem;font-weight:700;margin-bottom:10px;}
.hero h1 span{color:var(--accent);}
.subtitle{font-size:1.1rem;color:var(--accent);margin-bottom:20px;font-weight:500;}
.hero p{color:var(--text-muted);max-width:720px;margin-bottom:30px;font-size:0.97rem;}
.skills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:30px;}
.skill-tag{background:var(--tag-bg);color:var(--tag-color);border:1px solid var(--tag-border);padding:5px 14px;border-radius:20px;font-size:0.82rem;}
.hero-btns{display:flex;gap:12px;flex-wrap:wrap;}
.btn-primary{background:var(--accent);color:#0d1117;padding:12px 24px;border-radius:8px;font-weight:600;transition:opacity 0.2s;}
.btn-primary:hover{opacity:0.85;}
.btn-secondary{border:1px solid var(--border);color:var(--text);padding:12px 24px;border-radius:8px;transition:border-color 0.2s;}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent);}
section{max-width:900px;margin:0 auto;padding:60px 40px;}
section h2{font-size:1.6rem;margin-bottom:8px;}
.section-line{width:50px;height:3px;background:var(--accent);margin-bottom:40px;border-radius:2px;}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:20px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;transition:border-color 0.2s;}
.card:hover{border-color:var(--accent);}
.card h3{margin-bottom:10px;font-size:1rem;}
.card h3 a{color:var(--text);}
.card h3 a:hover{color:var(--accent);}
.card p{color:var(--text-muted);font-size:0.88rem;margin-bottom:16px;}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;}
.tags span{background:var(--tag-bg);color:var(--tag-color);border:1px solid var(--tag-border);padding:3px 10px;border-radius:12px;font-size:0.78rem;}
.gh-link{display:inline-block;margin-top:12px;font-size:0.85rem;color:var(--accent);}
.exp-list,.edu-list,.cert-grid{display:grid;gap:20px;}
.cert-grid{grid-template-columns:repeat(auto-fill,minmax(260px,1fr));}
.exp-card,.cert-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;}
.exp-card h3{font-size:1rem;margin-bottom:4px;}
.exp-card h3 span{color:var(--accent);}
.exp-meta{color:var(--text-muted);font-size:0.82rem;margin-bottom:14px;}
.exp-card>p{color:var(--text-muted);font-size:0.88rem;margin-bottom:12px;}
.exp-card ul{padding-left:0;list-style:none;}
.exp-card li{color:var(--text-muted);font-size:0.87rem;padding:5px 0;border-bottom:1px solid var(--border);}
.exp-card li:last-child{border-bottom:none;}
.exp-card li::before{content:'• ';color:var(--accent);}
.edu-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;display:flex;gap:20px;align-items:flex-start;}
.edu-icon{font-size:2rem;}
.edu-body h3{font-size:1rem;margin-bottom:4px;}
